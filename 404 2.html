<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Page not found — Stackly Business Solutions">
  <title>404 — Page Not Found | Stackly Business Solutions</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer">
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>

  <main class="error-page">
    <div>
      <div class="error-page__digits" aria-hidden="true">
        <span class="error-digit">4</span>
        <span class="error-digit">0</span>
        <span class="error-digit">4</span>
      </div>

      <h1 class="error-page__title">Oops! Page Not Found</h1>
      <p class="error-page__desc">
        The page you're looking for doesn't exist, has been moved, or the URL may be incorrect. Let's get you back on track.
      </p>

      <div class="error-page__actions">
        <button type="button" class="btn btn--outline btn--lg" id="goBack">
          <i class="fas fa-arrow-left"></i> Go Back
        </button>
        <a href="customer-dashboard.html" class="btn btn--primary btn--lg" id="goDashboard">
          <i class="fas fa-gauge-high"></i> Go Dashboard
        </a>
      </div>
    </div>
  </main>

  <script>
    (function () {
      // Go Back → previous page in history, with dashboard fallbacks
      const goBackBtn = document.getElementById('goBack');
      if (goBackBtn) {
        goBackBtn.addEventListener('click', () => {
          if (window.history.length > 1) {
            window.history.back();
            return;
          }
          // No history (page opened directly): use the stored source or referrer
          let fallback = '';
          try { fallback = sessionStorage.getItem('redirectSource') || ''; } catch (err) {}
          if (!fallback && document.referrer) fallback = document.referrer;
          if (!fallback) {
            const user = JSON.parse(localStorage.getItem('stackly_user') || 'null');
            fallback = (user && user.role === 'admin') ? 'admin-dashboard.html' : 'customer-dashboard.html';
          }
          window.location.href = fallback;
        });
      }

      // Go Dashboard → the logged-in user's dashboard home
      const goDashboard = document.getElementById('goDashboard');
      if (goDashboard) {
        const referrer = document.referrer || '';
        const user = JSON.parse(localStorage.getItem('stackly_user') || 'null');
        if (referrer.includes('admin-dashboard') || (user && user.role === 'admin')) {
          goDashboard.href = 'admin-dashboard.html';
        } else {
          goDashboard.href = 'customer-dashboard.html';
        }
      }
    })();
  </script>
  <script src="assets/js/transitions.js"></script>
</body>
</html>
