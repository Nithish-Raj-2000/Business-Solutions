<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Set a new password for your Stackly Business Solutions account.">
  <title>Reset Password — Stackly Business Solutions</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer">
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>

  <div class="auth-page">
    <div class="auth-page__visual">
      <div style="text-align: center; color: var(--color-text-inverse); max-width: 420px;">
        <a href="index.html" class="logo" style="justify-content: center; margin-bottom: 2rem;">
          <img src="assets/images/logos/stackly-logo-white.webp" alt="Stackly" class="logo__image">
          <span class="logo__tagline">Business Solutions</span>
        </a>
        <h2 style="font-size: var(--fs-2xl); margin-bottom: 1rem;">Secure Your Account</h2>
        <p style="opacity: 0.85; line-height: 1.7; font-size: var(--fs-sm);">
          Choose a strong, unique password that you don't use on other websites. We recommend at least 12 characters with a mix of letters, numbers, and symbols.
        </p>
      </div>
    </div>

    <div class="auth-page__form">
      <div class="auth-form">
        <h1 class="auth-form__title">Set New Password</h1>
        <p class="auth-form__subtitle">Enter and confirm your new password below</p>

        <form id="resetForm" data-validate-form data-success="Password updated successfully! Redirecting to login..." data-redirect-url="login.html" novalidate>
          <div class="form-group">
            <label class="form-label" for="resetPassword">New Password</label>
            <input type="password" id="resetPassword" name="password" class="form-input" placeholder="Enter new password" data-validate="required|password" autocomplete="new-password">
            <span class="form-error"></span>
          </div>

          <div class="form-group">
            <label class="form-label" for="resetConfirm">Confirm Password</label>
            <input type="password" id="resetConfirm" name="confirmPassword" class="form-input" placeholder="Confirm new password" data-validate="required|confirmPassword" autocomplete="new-password">
            <span class="form-error"></span>
          </div>

          <button type="submit" class="btn btn--primary" style="width: 100%;">
            <i class="fas fa-key"></i> Reset Password
          </button>
        </form>

        <div class="auth-form__footer">
          <a href="login.html"><i class="fas fa-arrow-left"></i> Back to Login</a>
        </div>
      </div>
    </div>
  </div>

  <script src="assets/js/components.js"></script>
  <script src="assets/js/forms.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/animations.js"></script>
</body>
</html>
